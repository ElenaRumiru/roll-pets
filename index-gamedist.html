<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css">
    <script>
        window["GD_OPTIONS"] = {
            "gameId": "YOUR_GD_GAME_ID",
            "onEvent": function(event) {
                if (event.name === "SDK_GAME_PAUSE") {
                    window.dispatchEvent(new Event("gdsdk-pause"));
                } else if (event.name === "SDK_GAME_START") {
                    window.dispatchEvent(new Event("gdsdk-resume"));
                }
            }
        };
    </script>
    <script src="https://html5.api.gamedistribution.com/main.min.js"></script>
    <title>PETS ROLL</title>
</head>

    <div id="app"><div id="game-container"></div></div>

</body>
