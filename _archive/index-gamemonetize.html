<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/style.css">
    <script>
        window.SDK_OPTIONS = {
            gameId: "YOUR_GM_GAME_ID",
            onEvent: function(event) {
                if (event.name === "SDK_GAME_PAUSE") {
                    window.dispatchEvent(new Event("gm-ad-pause"));
                } else if (event.name === "SDK_GAME_START") {
                    window.dispatchEvent(new Event("gm-ad-resume"));
                }
            }
        };
    </script>
    <script src="https://api.gamemonetize.com/sdk.js"></script>
    <title>PETS ROLL</title>
</head>
<body>
    <div id="app"><div id="game-container"></div></div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
